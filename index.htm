<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<title>Team Advisor</title>
<style>
:root {
  --em-green:    #00a86b;
  --em-green2:   #007a4d;
  --em-green3:   #004d30;
  --em-dark:     #0a1a12;
  --em-darker:   #060f0a;
  --em-gold:     #f0c040;
  --em-gold2:    #c89a20;
  --em-red:      #e04030;
  --em-blue:     #3060c0;
  --em-white:    #e8f4ec;
  --em-gray:     #4a6a54;
  --em-panel:    #0d2018;
  --em-panel2:   #122818;
  --em-border:   #1a4028;
  --em-shimmer:  rgba(0,168,107,0.15);
  --pixel: 2px;
}

/* ── MAP ── */
#pane-map { padding: 0; }
.map-controls {
display: flex; gap: 6px; flex-wrap: wrap;
padding: 10px 12px 8px; background: #060f0a;
border-bottom: 1px solid #1a4028;
}
.map-toggle {
-webkit-appearance: none; appearance: none;
font-family: ‘Courier New’, Courier, monospace;
font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
padding: 4px 10px; border-radius: 20px; cursor: pointer;
border: 1px solid; transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.map-toggle.on  { color: #060f0a; }
.map-toggle.off { background: transparent !important; opacity: 0.45; }
.map-wrap {
position: relative; overflow: hidden;
height: calc(100vh - 280px); min-height: 320px;
touch-action: none; background: #0a1a2a;
cursor: grab;
}
.map-wrap:active { cursor: grabbing; }
#map-svg {
position: absolute; top: 0; left: 0;
transform-origin: 0 0; will-change: transform;
user-select: none; -webkit-user-select: none;
}
/* Info panel */
.map-info-panel {
position: absolute; bottom: 0; left: 0; right: 0;
background: rgba(6,15,10,0.97);
border-top: 2px solid #1a4028;
border-radius: 12px 12px 0 0;
padding: 14px 16px 20px;
transform: translateY(100%);
transition: transform 0.25s ease;
max-height: 55%; overflow-y: auto;
z-index: 10;
}
.map-info-panel.open { transform: translateY(0); }
.map-info-close {
position: absolute; top: 10px; right: 14px;
background: transparent; border: none; color: #4a6a54;
font-size: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.map-info-name { font-size: 20px; color: #e8f4ec; letter-spacing: 1px; margin-bottom: 4px; }
.map-info-type { font-size: 9px; font-family: ‘Courier New’,monospace; letter-spacing: 2px; margin-bottom: 10px; }
.encounter-row {
display: flex; align-items: center; gap: 8px;
padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
font-size: 14px; color: #e8f4ec;
}
.encounter-rarity {
font-family: ‘Courier New’,monospace; font-size: 8px;
letter-spacing: 1px; padding: 2px 6px; border-radius: 10px;
margin-left: auto; flex-shrink: 0;
}
.rarity-common   { background: rgba(100,200,100,0.15); color: #6cc86c; }
.rarity-uncommon { background: rgba(100,150,255,0.15); color: #6496ff; }
.rarity-rare     { background: rgba(255,200,50,0.15);  color: #ffc832; }
.map-no-data { font-size: 13px; color: #4a6a54; font-style: italic; margin-top: 6px; }

/* ── GAME SELECTOR ── *//* ── GAME SELECTOR ── */
.game-selector {
display: flex; gap: 6px; flex-wrap: wrap;
justify-content: center; margin-bottom: 14px;
}
.game-btn {
-webkit-appearance: none; appearance: none;
border-radius: 6px; padding: 6px 10px;
font-family: ‘Courier New’, Courier, monospace;
font-size: 9px; font-weight: bold; letter-spacing: 1px;
cursor: pointer; border: 2px solid transparent;
transition: all 0.15s; -webkit-tap-highlight-color: transparent;
line-height: 1.4; text-align: center;
}
.game-btn.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
.game-btn.inactive { opacity: 0.5; filter: grayscale(0.3); }
.game-btn:active { transform: scale(0.95); }

- { box-sizing: border-box; margin: 0; padding: 0; }

button, input, select, textarea {
-webkit-appearance: none !important;
-moz-appearance: none !important;
appearance: none !important;
border-radius: 0;
background-image: none;
font-family: ‘Courier New’, Courier, monospace;
}

html { background: #060f0a !important; }

body {
background: #060f0a !important;
background: #060f0a !important;
font-family: ‘Courier New’, Courier, monospace;
color: #e8f4ec;
color: #e8f4ec;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* ── BACKGROUND LAYER ── */
#bg-canvas {
position: fixed; inset: 0; z-index: 0;
pointer-events: none; overflow: hidden;
}
#bg-canvas .bg-layer {
position: absolute; inset: 0;
transition: opacity 1.2s ease;
}

/* Scanlines - always on top */
body::after {
content: ‘’;
position: fixed; inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
pointer-events: none; z-index: 1;
}

/* ── GAME-SPECIFIC ANIMATIONS ── */

/* Emerald - scrolling grid */
@keyframes gridScroll {
0%   { background-position: 0 0; }
100% { background-position: 32px 32px; }
}
@keyframes gridScrollFast {
0%   { background-position: 0 0; }
100% { background-position: 48px 48px; }
}

/* Red/Blue - horizontal scanline sweep */
@keyframes scanSweep {
0%   { transform: translateY(-100%); }
100% { transform: translateY(100vh); }
}

/* Yellow - lightning flicker */
@keyframes lightningFlicker {
0%,94%,96%,100% { opacity: 0; }
95% { opacity: 0.15; }
}

/* Gold/Silver - shimmer sweep */
@keyframes shimmerSweep {
0%   { transform: translateX(-100%) rotate(20deg); }
100% { transform: translateX(200%) rotate(20deg); }
}

/* FireRed - ember float */
@keyframes emberRise {
0%   { transform: translateY(100vh) translateX(0px) scale(1); opacity: 0; }
10%  { opacity: 0.8; }
90%  { opacity: 0.4; }
100% { transform: translateY(-20px) translateX(40px) scale(0.3); opacity: 0; }
}
@keyframes emberRise2 {
0%   { transform: translateY(100vh) translateX(0px) scale(0.8); opacity: 0; }
10%  { opacity: 0.6; }
90%  { opacity: 0.3; }
100% { transform: translateY(-20px) translateX(-30px) scale(0.2); opacity: 0; }
}

/* Diamond/Pearl - snow drift */
@keyframes snowDrift {
0%   { transform: translateY(-10px) translateX(0px); opacity: 0; }
10%  { opacity: 0.7; }
90%  { opacity: 0.4; }
100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
}
@keyframes snowDrift2 {
0%   { transform: translateY(-10px) translateX(0px); opacity: 0; }
10%  { opacity: 0.5; }
100% { transform: translateY(100vh) translateX(-15px); opacity: 0; }
}

/* Pulse glow for all games */
@keyframes bgPulse {
0%,100% { opacity: 0.4; }
50%      { opacity: 0.7; }
}
@keyframes bgPulse2 {
0%,100% { opacity: 0.2; }
50%      { opacity: 0.5; }
}
@keyframes rotateSlow {
0%   { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}

.container {
max-width: 480px; margin: 0 auto;
padding: 0 12px 60px;
position: relative; z-index: 2;
}

/* ── HEADER ── */
.header {
text-align: center;
padding: 24px 0 16px;
position: relative;
}
.header-gem {
display: flex; justify-content: center; align-items: center; gap: 10px;
margin-bottom: 6px;
}
.gem {
width: 14px; height: 14px;
background: linear-gradient(135deg, #00ff88, #00a86b, #004d30);
clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
animation: gemPulse 2s ease-in-out infinite;
filter: drop-shadow(0 0 6px #00ff88);
}
@keyframes gemPulse {
0%,100% { filter: drop-shadow(0 0 4px #00ff88); }
50%     { filter: drop-shadow(0 0 12px #00ff88); }
}
.header-title {
font-family: ‘Courier New’, Courier, monospace;
font-size: 14px; color: #f0c040;
font-weight: bold;
text-transform: uppercase;
text-shadow: 2px 2px 0 #c89a20, 0 0 20px rgba(240,192,64,0.4);
letter-spacing: 3px; line-height: 1.6;
}
.header-sub {
font-size: 18px; color: #00a86b;
letter-spacing: 3px; margin-top: 2px;
}
.header-version {
display: inline-block;
background: #00a86b;
color: #060f0a;
font-family: ‘Courier New’, Courier, monospace;
font-size: 7px; padding: 3px 8px; border-radius: 2px;
margin-top: 6px; letter-spacing: 1px;
}

/* ── DIVIDER ── */
.divider {
height: 2px; margin: 10px 0;
background: linear-gradient(90deg, transparent, #00a86b, #f0c040, #00a86b, transparent);
}

/* ── TABS ── */
.tabs {
display: grid; grid-template-columns: repeat(4, 1fr);
gap: 4px; margin-bottom: 16px;
background: #0d2018; border: 2px solid #1a4028;
border-radius: 4px; padding: 4px;
}
.tab {
padding: 10px 4px; text-align: center;
font-family: ‘Courier New’, Courier, monospace; font-size: 9px;
font-weight: bold; letter-spacing: 0.5px; border-radius: 3px; cursor: pointer;
border: 2px solid transparent; transition: all 0.15s;
line-height: 1.4; -webkit-tap-highlight-color: transparent;
}
.tab .tab-icon { font-size: 18px; display: block; margin-bottom: 3px; line-height: 1; }
.tab .tab-label { display: block; }
.tab.active {
color: #ffffff;
box-shadow: 0 0 12px rgba(255,255,255,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
}
.tab.inactive {
background: rgba(255,255,255,0.05) !important;
}
.tab.inactive:active { opacity: 0.8; }

/* ── PANEL ── */
.panel {
background: #0d2018;
border: 2px solid #1a4028;
border-radius: 4px;
padding: 14px;
margin-bottom: 12px;
position: relative;
overflow: hidden;
}
.panel::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, #00a86b, transparent);
}
.panel-label {
font-family: ‘Courier New’, Courier, monospace;
font-size: 7px; color: #f0c040; letter-spacing: 1px;
margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.panel-label::after {
content: ‘’; flex: 1; height: 1px;
background: linear-gradient(90deg, #1a4028, transparent);
}

/* ── SEARCH INPUT ── */
.search-row { display: flex; gap: 6px; }
.poke-input {
flex: 1;
background: #060f0a; border: 2px solid #1a4028;
border-radius: 3px; padding: 10px 12px;
color: #e8f4ec; font-family: ‘Courier New’, Courier, monospace; font-size: 18px;
outline: none; letter-spacing: 1px;
transition: border-color 0.15s;
}
.poke-input:focus { border-color: #00a86b; box-shadow: 0 0 0 2px rgba(0,168,107,0.2); }
.poke-input::placeholder { color: #4a6a54; }

.poke-btn {
background: #00a86b; border: 2px solid #f0c040;
border-radius: 3px; color: #060f0a;
font-family: ‘Courier New’, Courier, monospace; font-size: 8px;
padding: 0 14px; cursor: pointer; letter-spacing: 1px;
transition: all 0.1s; -webkit-tap-highlight-color: transparent;
white-space: nowrap;
}
.poke-btn:active { background: #007a4d; transform: translateY(1px); }

.poke-btn-gray {
background: #122818; border: 2px solid #1a4028;
border-radius: 3px; color: #4a6a54;
font-family: ‘Courier New’, Courier, monospace; font-size: 8px;
padding: 0 14px; cursor: pointer; letter-spacing: 1px;
-webkit-tap-highlight-color: transparent;
}
.poke-btn-gray:active { background: #1a4028; }

/* ── SUGGESTIONS ── */
.suggestions { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.suggestion {
background: #060f0a; border: 1px solid #1a4028;
color: #4a6a54; font-family: ‘Courier New’, Courier, monospace; font-size: 16px;
padding: 3px 10px; border-radius: 2px; cursor: pointer;
-webkit-tap-highlight-color: transparent; letter-spacing: 1px;
}
.suggestion:active { border-color: #00a86b; color: #e8f4ec; }

/* ── ERROR ── */
.poke-error { color: #e04030; font-size: 15px; margin-top: 6px; letter-spacing: 1px; }

/* ── LOADING ── */
.poke-loading {
text-align: center; color: #00a86b; font-size: 18px;
letter-spacing: 3px; padding: 20px;
animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── ENEMY CARD ── */
.enemy-card {
background: #122818; border: 2px solid #1a4028;
border-radius: 4px; padding: 14px;
display: flex; align-items: center; gap: 14px;
margin-bottom: 12px; position: relative; overflow: hidden;
}
.enemy-card::after {
content: ‘’; position: absolute; inset: 0;
background: radial-gradient(ellipse at 20% 50%, rgba(0,168,107,0.08), transparent 60%);
pointer-events: none;
}
.enemy-sprite {
width: 80px; height: 80px; image-rendering: pixelated; flex-shrink: 0;
filter: drop-shadow(0 0 8px rgba(0,168,107,0.4));
}
.enemy-vs { font-family: ‘Courier New’, Courier, monospace; font-size: 7px; color: #4a6a54; letter-spacing: 2px; margin-bottom: 4px; }
.enemy-name { font-size: 26px; color: #e8f4ec; letter-spacing: 2px; text-transform: capitalize; line-height: 1; }
.type-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tbadge {
color: #fff; font-family: ‘Courier New’, Courier, monospace; font-size: 6px;
padding: 3px 6px; border-radius: 2px; letter-spacing: 0.5px;
text-transform: uppercase; text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
}

/* ── PARTY RESULT CARDS ── */
.party-results { display: flex; flex-direction: column; gap: 8px; }
.result-card {
background: #122818; border: 2px solid #1a4028;
border-radius: 4px; padding: 10px 12px;
display: flex; align-items: center; gap: 10px;
position: relative; overflow: hidden;
transition: border-color 0.15s;
}
.result-card.best {
border-color: #f0c040;
background: linear-gradient(135deg, rgba(240,192,64,0.08), #122818);
box-shadow: 0 0 16px rgba(240,192,64,0.15);
}
.result-card.best::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, #f0c040, transparent);
}
.result-card.dimmed { opacity: 0.45; }
.result-sprite { width: 52px; height: 52px; image-rendering: pixelated; flex-shrink: 0; }
.result-info { flex: 1; min-width: 0; }
.result-name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.result-name { font-size: 20px; color: #e8f4ec; letter-spacing: 1px; }
.result-ptype { font-family: ‘Courier New’, Courier, monospace; font-size: 6px; color: #4a6a54; }
.result-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.r-badge {
font-family: ‘Courier New’, Courier, monospace; font-size: 6px; font-weight: bold;
letter-spacing: 0.5px; padding: 3px 7px; border-radius: 2px; white-space: nowrap;
}
.r-danger { font-size: 14px; color: #e04030; letter-spacing: 1px; }
.r-moves { font-size: 14px; color: #4a6a54; margin-top: 3px; letter-spacing: 1px; }
.best-crown {
position: absolute; top: 6px; right: 8px;
font-family: ‘Courier New’, Courier, monospace; font-size: 6px;
color: #f0c040; letter-spacing: 1px;
}

/* ── SECTION LABEL ── */
.sec-label {
font-family: ‘Courier New’, Courier, monospace; font-size: 7px;
color: #00a86b; letter-spacing: 1px; margin-bottom: 8px;
display: flex; align-items: center; gap: 6px;
}
.sec-label::after { content: ‘’; flex: 1; height: 1px; background: #1a4028; }

/* ── TEAM EDITOR ── */
.member-card {
background: #122818; border: 2px solid #1a4028;
border-radius: 4px; margin-bottom: 8px; overflow: hidden;
transition: border-color 0.15s;
}
.member-card.open { border-color: #00a86b; }
.member-header {
display: flex; align-items: center; gap: 10px;
padding: 10px 12px; cursor: pointer;
-webkit-tap-highlight-color: transparent;
}
.member-sprite { width: 52px; height: 52px; image-rendering: pixelated; flex-shrink: 0; }
.member-info { flex: 1; }
.member-name { font-size: 20px; color: #e8f4ec; letter-spacing: 1px; }
.member-species { font-size: 11px; color: #4a6a54; letter-spacing: 2px; margin-top: 1px; text-transform: uppercase; }
.nickname-input {
background: transparent; border: none; border-bottom: 1px dashed #1a4028;
color: #f0c040; font-family: ‘Courier New’, Courier, monospace;
font-size: 18px; letter-spacing: 2px; outline: none; width: 100%;
padding: 2px 0; text-transform: uppercase; -webkit-appearance: none;
}
.nickname-input::placeholder { color: #2a4a38; font-style: italic; text-transform: none; letter-spacing: 0; font-size: 14px; }
.nickname-input:focus { border-bottom-color: #f0c040; }

/* Move autocomplete */
.move-wrap { position: relative; flex: 1; }
.move-suggestions {
position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
background: #0d2018; border: 1px solid #1a4028; border-top: none;
border-radius: 0 0 4px 4px; max-height: 150px; overflow-y: auto;
}
.move-suggestion-item {
display: flex; align-items: center; gap: 8px;
padding: 6px 10px; cursor: pointer; font-size: 14px; color: #e8f4ec;
-webkit-tap-highlight-color: transparent;
}
.move-suggestion-item:active { background: rgba(0,168,107,0.15); }
.move-sug-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.move-sug-type { font-size: 9px; color: #4a6a54; letter-spacing: 1px; margin-left: auto; font-family: ‘Courier New’, Courier, monospace; }
.member-types { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.member-chevron {
font-family: ‘Courier New’, Courier, monospace; font-size: 9px; color: #4a6a54;
transition: transform 0.2s; padding: 4px;
}
.member-chevron.open { transform: rotate(180deg); color: #00a86b; }
.member-body {
border-top: 2px solid #1a4028; padding: 12px;
display: none;
}
.member-body.open { display: block; }

/* Editor sections */
.ed-section { margin-bottom: 14px; }
.ed-label {
font-family: ‘Courier New’, Courier, monospace; font-size: 7px;
color: #f0c040; letter-spacing: 1px; margin-bottom: 8px;
}

/* Swap */
.swap-row { display: flex; gap: 6px; }
.swap-preview {
display: flex; align-items: center; gap: 10px; margin-top: 8px;
background: rgba(0,168,107,0.08); border: 2px solid #00a86b;
border-radius: 4px; padding: 8px 10px;
}
.swap-preview img { width: 48px; height: 48px; image-rendering: pixelated; }
.swap-preview-name { font-size: 18px; color: #e8f4ec; text-transform: capitalize; letter-spacing: 1px; }
.swap-preview-types { display: flex; gap: 4px; margin-top: 3px; }
.swap-confirm {
margin-left: auto;
background: #00a86b; border: 2px solid #f0c040;
border-radius: 3px; color: #060f0a;
font-family: ‘Courier New’, Courier, monospace; font-size: 7px;
padding: 6px 10px; cursor: pointer; white-space: nowrap;
-webkit-tap-highlight-color: transparent;
}

/* Evolution */
.evo-chain { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.evo-step {
display: flex; flex-direction: column; align-items: center;
background: #060f0a; border: 2px solid #1a4028;
border-radius: 4px; padding: 6px 8px; cursor: pointer;
min-width: 62px; -webkit-tap-highlight-color: transparent;
transition: all 0.15s;
}
.evo-step img { width: 44px; height: 44px; image-rendering: pixelated; }
.evo-step-name { font-family: ‘Courier New’, Courier, monospace; font-size: 6px; color: #4a6a54; margin-top: 3px; text-transform: capitalize; text-align: center; line-height: 1.4; }
.evo-step.current { border-color: #00a86b; background: rgba(0,168,107,0.1); }
.evo-step.current .evo-step-name { color: #00a86b; }
.evo-step.available { border-color: #f0c040; background: rgba(240,192,64,0.08); box-shadow: 0 0 8px rgba(240,192,64,0.2); }
.evo-step.available .evo-step-name { color: #f0c040; }
.evo-arrow { color: #00a86b; font-size: 20px; }
.evo-hint { font-size: 13px; color: #4a6a54; letter-spacing: 1px; margin-top: 5px; }
.evo-none { font-size: 15px; color: #4a6a54; font-style: italic; }
.evo-load-btn {
background: #060f0a; border: 2px dashed #1a4028;
border-radius: 3px; color: #4a6a54;
font-family: ‘Courier New’, Courier, monospace; font-size: 7px;
padding: 9px 12px; cursor: pointer; width: 100%;
-webkit-tap-highlight-color: transparent; letter-spacing: 1px;
}
.evo-load-btn:active { border-color: #00a86b; color: #00a86b; }

/* Moves */
.moves-list { display: flex; flex-direction: column; gap: 6px; }
.move-row { display: flex; align-items: center; gap: 6px; }
.move-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
.move-input {
flex: 1; background: #060f0a; border: 2px solid #1a4028;
border-radius: 3px; padding: 7px 10px; color: #e8f4ec;
font-family: ‘Courier New’, Courier, monospace; font-size: 17px; outline: none; letter-spacing: 1px;
}
.move-input:focus { border-color: #00a86b; }
.move-remove {

.catch-result {
background: #122818; border: 2px solid #1a4028;
border-radius: 4px; overflow: hidden; margin-top: 10px;
}
.catch-header {
display: flex; align-items: center; gap: 12px;
padding: 12px 14px;
background: #0d2018;
border-bottom: 2px solid #1a4028;
}
.catch-sprite { width: 72px; height: 72px; image-rendering: pixelated; flex-shrink: 0; filter: drop-shadow(0 0 6px rgba(0,168,107,0.3)); }
.catch-pname { font-size: 24px; color: #e8f4ec; letter-spacing: 2px; text-transform: capitalize; }
.catch-verdict {
display: inline-block; margin-top: 5px;
font-family: ‘Courier New’, Courier, monospace; font-size: 7px;
padding: 4px 8px; border-radius: 2px; letter-spacing: 1px;
}
.verdict-yes { background: #00a86b; color: #060f0a; }
.verdict-maybe { background: #f0c040; color: #060f0a; }
.verdict-no { background: #e04030; color: #fff; }

.catch-body { padding: 12px 14px; }
.catch-reason {
font-size: 16px; color: #e8f4ec; letter-spacing: 1px; line-height: 1.5;
margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #1a4028;
}

.swap-suggestion {
background: #060f0a; border: 2px solid #1a4028;
border-radius: 3px; padding: 10px 12px; margin-bottom: 6px;
display: flex; align-items: center; gap: 10px;
}
.swap-suggestion.recommended { border-color: #f0c040; background: rgba(240,192,64,0.06); }
.swap-sug-sprite { width: 44px; height: 44px; image-rendering: pixelated; flex-shrink: 0; }
.swap-sug-info { flex: 1; }
.swap-sug-name { font-size: 17px; color: #e8f4ec; letter-spacing: 1px; }
.swap-sug-reason { font-size: 13px; color: #4a6a54; margin-top: 2px; letter-spacing: 1px; }
.swap-sug-label {
font-family: ‘Courier New’, Courier, monospace; font-size: 6px;
color: #f0c040; letter-spacing: 1px; white-space: nowrap;
}

/* Coverage bars */
.coverage-section { margin-top: 12px; }
.coverage-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.cov-type {
font-family: ‘Courier New’, Courier, monospace; font-size: 6px;
padding: 2px 5px; border-radius: 2px; color: #fff; min-width: 52px;

.cov-bar-bg { flex: 1; height: 8px; background: #060f0a; border-radius: 1px; overflow: hidden; border: 1px solid #1a4028; }
.cov-bar { height: 100%; border-radius: 1px; transition: width 0.4s ease; }
.cov-label { font-size: 13px; color: #4a6a54; min-width: 30px; text-align: right; }

/* Pokéball deco */
.pokeball-deco {
position: fixed; bottom: -30px; right: -30px;
width: 120px; height: 120px; opacity: 0.04;
border: 8px solid #00a86b;
border-radius: 50%; pointer-events: none; z-index: 0;
}
.pokeball-deco::after {
content: ‘’; position: absolute; top: 50%; left: -8px; right: -8px; height: 8px;
background: #00a86b; transform: translateY(-50%);
}

/* HP bar style num display */
.stat-bar { height: 6px; border-radius: 1px; background: #060f0a; border: 1px solid #1a4028; margin-top: 4px; overflow: hidden; }
.stat-fill { height: 100%; background: linear-gradient(90deg, #00a86b, #00ff88); border-radius: 1px; }

.empty-state {

color: #4a6a54; font-size: 15px; letter-spacing: 2px; line-height: 2.2;

.empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }

async function fetchMoveType(moveName) {
  const normalized = moveName.trim().toLowerCase();
  const dashKey = normalized.replace(/ /g, '-');

  // Check caches first
  if (moveTypeCache[dashKey]) return moveTypeCache[dashKey];
  if (moveTypeCache[normalized]) return moveTypeCache[normalized];
  if (MOVE_TYPES[normalized] !== undefined) return MOVE_TYPES[normalized];
  if (MOVE_TYPES[dashKey] !== undefined) return MOVE_TYPES[dashKey];

  // Build a list of slugs to try in order
  const aliasKey = MOVE_ALIASES[normalized];
  const slugsToTry = [];
  if (aliasKey) slugsToTry.push(aliasKey);
  slugsToTry.push(dashKey);

  // Also try inserting a dash between camelCase transitions e.g. "thundershock" -> "thunder-shock"
  const camelToDash = normalized.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
  if (!slugsToTry.includes(camelToDash)) slugsToTry.push(camelToDash);

  // Try splitting on common word boundaries for compound words
  // e.g. "thundershock" -> "thunder-shock", "quickattack" -> "quick-attack"
  const compoundWords = [
    ['thunder','shock'],['quick','attack'],['razor','leaf'],['solar','beam'],
    ['water','gun'],['hydro','pump'],['ice','beam'],['rock','throw'],
    ['rock','slide'],['rock','smash'],['vine','whip'],['double','slap'],
    ['body','slam'],['take','down'],['double','edge'],['wing','attack'],
    ['drill','peck'],['mach','punch'],['cross','chop'],['giga','drain'],
    ['mega','drain'],['fury','attack'],['fury','swipes'],['fury','cutter'],
    ['pin','missile'],['spike','cannon'],['horn','attack'],['horn','drill'],
    ['hyper','beam'],['hyper','fang'],['fire','spin'],['fire','punch'],
    ['fire','blast'],['ice','punch'],['thunder','punch'],['skull','bash'],
    ['steel','wing'],['iron','tail'],['metal','claw'],['shadow','ball'],
    ['mud','slap'],['sludge','bomb'],['dragon','rage'],['dragon','breath'],
    ['dragon','claw'],['sky','attack'],['zap','cannon'],['bone','rush'],
    ['ancient','power'],['mirror','coat'],['future','sight'],['beat','up'],
    ['fake','out'],['belly','drum'],['baton','pass'],['rapid','spin'],
    ['false','swipe'],['lock','on'],['mean','look'],['perish','song'],
    ['destiny','bond'],['pain','split'],['heal','bell'],['mortal','blow'],
  ];
  for (const [a, b] of compoundWords) {
    const joined = a + b;
    if (normalized === joined || normalized === a+' '+b) {
      const slug = a + '-' + b;
      if (!slugsToTry.includes(slug)) slugsToTry.push(slug);
    }
  }

  // Try each slug until one works
  for (const slug of slugsToTry) {
    try {
      const res = await fetch('https://pokeapi.co/api/v2/move/' + slug);
      if (!res.ok) continue;
      const data = await res.json();
      // If move has no power it's a status move — treat as "—" for damage purposes
      const type = (data.power && data.power > 0) ? data.type.name : '—';
      // Cache under both the original key and the working slug
      moveTypeCache[dashKey] = type;
      moveTypeCache[slug] = type;
      try {
        const cached = JSON.parse(localStorage.getItem('emerald_move_cache') || '{}');
        cached[dashKey] = type;
        cached[slug] = type;
        localStorage.setItem('emerald_move_cache', JSON.stringify(cached));
      } catch(e) {}
      return type;
    } catch(e) { continue; }
  }
  return null;
}

function getMoveType(moveName) {
  if (!moveName || moveName === '—') return '—';
  const key = moveName.trim().toLowerCase();
  const dashKey = key.replace(/ /g, '-');
  // Check hardcoded dict (space and dash variants)
  if (MOVE_TYPES[key] !== undefined) return MOVE_TYPES[key];
  if (MOVE_TYPES[dashKey] !== undefined) return MOVE_TYPES[dashKey];
  // Fall back to API cache for any moves not in dict
  if (moveTypeCache[key]) return moveTypeCache[key];
  if (moveTypeCache[dashKey]) return moveTypeCache[dashKey];
  return null;
}

// Load move cache from localStorage SYNCHRONOUSLY on script parse
(function() {
  try {
    const cached = JSON.parse(localStorage.getItem('emerald_move_cache') || '{}');
    Object.assign(moveTypeCache, cached);
    // Debug: log key moves
    console.log('Cache loaded. tackle='+cached['tackle']+' vine-whip='+cached['vine-whip']+' growl='+cached['growl']+' total='+Object.keys(cached).length);
  } catch(e) { console.log('Cache load error:',e); }
})();

  root.style.setProperty('--game-panel', game.panel);
  root.style.setProperty('--game-panel2', game.panel2);
  root.style.setProperty('--game-border', game.border);
  root.style.setProperty('--game-gold', game.gold);
  root.style.setProperty('--game-gray', game.gray);
  root.style.setProperty('--game-white', game.white);

  // Update all the hardcoded color elements
  document.querySelectorAll('.member-card, .panel, .enemy-card, .result-card, .catch-result, .swap-suggestion').forEach(el => {
    el.style.background = game.panel2;
    el.style.borderColor = game.border;
  });
  document.querySelectorAll('.tabs').forEach(el => {
    el.style.background = game.panel;
    el.style.borderColor = game.border;
  });

  // Update title
  const titleEl = document.getElementById('gameTitle');
  const regionEl = document.getElementById('gameRegion');
  if (titleEl) titleEl.textContent = game.title;
  if (regionEl) regionEl.textContent = game.region;
  titleEl.style.color = game.accent;

  // Update gem colors
  document.querySelectorAll('.gem').forEach(gem => {
    gem.style.background = `linear-gradient(135deg, ${game.gem}, ${game.accent}, ${game.bg})`;
    gem.style.filter = `drop-shadow(0 0 6px ${game.gem})`;
  });

  // Update all tabs with correct game colors
  document.querySelectorAll('.tab').forEach(t => {
    if (t.classList.contains('active')) {
      t.style.background = game.accent;
      t.style.borderColor = game.gold;
      t.style.color = '#ffffff';
      t.style.opacity = '1';
    } else {
      t.style.background = 'rgba(255,255,255,0.05)';
      t.style.borderColor = game.border;
      t.style.color = game.white;
      t.style.opacity = '0.6';
    }
  });

  // Update divider
  document.querySelectorAll('.divider').forEach(d => {
    d.style.background = `linear-gradient(90deg, transparent, ${game.accent}, ${game.gold}, ${game.accent}, transparent)`;

  // Update input/button/refresh colors
  updateUIColors(game);

  updateMapToggleColors();

  renderGameSelector();
}

function switchGame(gameId) {
  if (gameId === currentGame.id) return;
  // Save current team under current game key
  saveTeam();
  // Switch game
  currentGame = GAMES.find(g => g.id === gameId);
  // Load that game's team from storage, or use default
  try {
    const saved = localStorage.getItem('team_' + gameId);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length === 6) {
        team = parsed;
      } else {
        team = JSON.parse(JSON.stringify(currentGame.defaultTeam));
      }
    } else {
      team = JSON.parse(JSON.stringify(currentGame.defaultTeam));
    }
  } catch(e) {
    team = JSON.parse(JSON.stringify(currentGame.defaultTeam));
  }
  editorState = team.map(() => ({
    open:false, swapInput:'', swapPreview:null, swapError:'',
    swapLoading:false, evoChain:null, evoLoading:false,
  }));
  // Save current game preference
  try { localStorage.setItem('current_game', gameId); } catch(e) {}
  // Apply theme and re-render
  applyGameTheme(currentGame);
  renderGameSelector();
  if (document.getElementById('pane-team').style.display !== 'none') renderTeamEditor();
  // Pre-fetch moves for new team
  const allMoves = team.flatMap(p => p.moves).filter(m => m && m !== '—');
  const uncached = [...new Set(allMoves)].filter(m => !getMoveType(m));
  if (uncached.length > 0) Promise.all(uncached.map(m => fetchMoveType(m))).then(() => updateAllMoveDots());
}

function addToHistory(historyArr, containerId, name, lookupFn) {
  const proper = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  // Remove if already exists, then add to front
  const idx = historyArr.findIndex(h => h.toLowerCase() === proper.toLowerCase());
  if (idx !== -1) historyArr.splice(idx, 1);
  historyArr.unshift(proper);
  if (historyArr.length > 10) historyArr.pop();
  renderHistory(containerId, historyArr, lookupFn);
}

function renderHistory(containerId, historyArr, lookupFn) {
  const el = document.getElementById(containerId);
  if (!historyArr.length) {
    el.innerHTML = '<span style="font-size:13px;color:#4a6a54;letter-spacing:1px">— NO RECENT SEARCHES —</span>';
    return;
  }
  el.innerHTML = historyArr.map(s =>
    `<button class="suggestion" onclick="${lookupFn}('${s}')">${s}</button>`
  ).join('');
}

// ─── HELPERS ─────────────────────────────────────────────────
function getEff(at, defTypes) {
  let m = 1;
  defTypes.forEach(dt => m *= ((TYPE_CHART[at]||{})[dt] ?? 1));
  return m;
}
function getAttackTypes(moves, pokemonTypes) {
  const s = new Set();
  moves.forEach(m => {
    const t = getMoveType(m);
    if (t && t !== '—') s.add(t);
  });
  // If no moves are recognized, fall back to the pokemon's own types
  if (s.size === 0 && pokemonTypes) pokemonTypes.forEach(t => s.add(t));
  return [...s];
}
function getBestMult(moves, defTypes, pokemonTypes) {
  const ats = getAttackTypes(moves, pokemonTypes);
  if (!ats.length) return 0;
  return Math.max(...ats.map(at => getEff(at, defTypes)));
}
function getDefMult(pTypes, atkTypes) {
  let m = 1;
  atkTypes.forEach(at => pTypes.forEach(dt => m *= ((TYPE_CHART[at]||{})[dt] ?? 1)));
  return m;
}
function getRating(mult) {
  if (mult === 0)  return { label:"NO EFFECT",        color:"#555555" };
  if (mult >= 4)   return { label:"4× SUPER!",         color:"#ff4444" };
  if (mult >= 2)   return { label:"2× SUPER",          color:"#00c864" };
  if (mult === 1)  return { label:"NEUTRAL",           color:"#6b7280" };
  return              { label:"NOT VERY",           color:"#ff9900" };
}
function typeBadge(t) {
  return `<span class="tbadge" style="background:${TC[t]||'#555'}">${t}</span>`;
}
function spriteUrl(id) {
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
}
async function fetchPoke(name) {
  const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.trim().toLowerCase()}`);
  if (!res.ok) throw new Error();
  const d = await res.json();
  return { name:d.name, id:d.id, types:d.types.map(t=>t.type.name), sprite:d.sprites.front_default };
}

// ─── TEAM COVERAGE SCORE ─────────────────────────────────────
function teamCoverageScore(members) {
  // How many of 18 types have at least 2× coverage
  let covered = 0;
  ALL_TYPES.forEach(t => {
    const hasCoverage = members.some(p => getBestMult(p.moves, [t]) >= 2);
    if (hasCoverage) covered++;
  });
  return covered;
}

function teamWeaknesses(members) {
  // Types that ALL members are weak to (no one resists)
  return ALL_TYPES.filter(t =>
    members.every(p => getDefMult(p.types, [t]) >= 2)
  );
}

function teamUncoveredTypes(members) {
  return ALL_TYPES.filter(t =>
    !members.some(p => getBestMult(p.moves, [t]) >= 2)
  );
}

function renderBattle(enemy) {
  const scored = team.map(p => ({
    ...p,
    offMult: getBestMult(p.moves, enemy.types, p.types),
    defMult: getDefMult(p.types, enemy.types),
  })).sort((a,b) => b.offMult - a.offMult);

  let html = `
    <div class="enemy-card">
      <img class="enemy-sprite" src="${enemy.sprite}" alt="${enemy.name}"/>
      <div>
        <div class="enemy-vs">VS</div>
        <div class="enemy-name">${enemy.name}</div>
        <div class="type-badges">${enemy.types.map(typeBadge).join('')}</div>
      </div>
    </div>
    <div class="sec-label">PARTY MATCHUP</div>
    <div class="party-results">
  `;

  scored.forEach((p, i) => {
    const isTop = i === 0 && p.offMult > 0;
    const r = getRating(p.offMult);
    const takesSuper = p.defMult >= 2;
    // Sort ALL moves: damage moves by effectiveness first, status moves at bottom
    const allMovesRated = p.moves
      .filter(m => m && m !== '—')
      .map(m => {
        const t = getMoveType(m);
        const isDamage = t && t !== '—' && t !== null;
        const eff = isDamage ? getEff(t, enemy.types) : -1;
        return { name: m, eff, type: t, isDamage };
      })
      .sort((a, b) => b.eff - a.eff);

    // Build move list with per-move effectiveness indicator
    const moveDisplay = allMovesRated.map(mv => {
      let indicator = '';
      if (!mv.isDamage) {
        indicator = '<span style="color:#4a6a54;font-size:10px">STATUS</span> ';
      } else if (mv.eff >= 4)       indicator = '<span style="color:#ff4444;font-size:11px">4×</span> ';
      else if (mv.eff >= 2)  indicator = '<span style="color:#4cff72;font-size:11px">2×</span> ';
      else if (mv.eff > 0 && mv.eff < 1) indicator = '<span style="color:#ff9900;font-size:11px">½×</span> ';
      else if (mv.eff === 0) indicator = '<span style="color:#555;font-size:11px">0×</span> ';
      // Dot color: typed moves get type color, status get faint, unknown get dashed
      let dotStyle;
      if (!mv.type) {
        dotStyle = 'background:transparent;border:1px dashed rgba(255,255,255,0.2)';
      } else if (!mv.isDamage) {
        dotStyle = 'background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2)';
      } else {
        dotStyle = 'background:' + (TC[mv.type] || '#888');
      }
      return `<div style="display:flex;align-items:center;gap:5px;margin:2px 0;opacity:${mv.isDamage?'1':'0.6'}">
        <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;${dotStyle}"></div>
        <span>${indicator}${mv.name}</span>
      </div>`;
    }).join('');

    html += `
      <div class="result-card ${isTop?'best':p.offMult===0?'dimmed':''}">
        ${isTop ? `<div class="best-crown">★ BEST</div>` : ''}
        <img class="result-sprite" src="${spriteUrl(p.id)}" alt="${p.name}"/>
        <div class="result-info">
          <div class="result-name-row">
            <span class="result-name">${p.nickname ? p.nickname.toUpperCase() : p.name}</span>
            ${p.nickname ? `<span class="result-ptype" style="color:#4a6a54">${p.name}</span>` : `<span class="result-ptype">${p.types.map(t=>t.toUpperCase()).join('/')}</span>`}
          </div>
          ${p.nickname ? `<div style="font-size:9px;color:#4a6a54;letter-spacing:1px;margin-bottom:2px">${p.types.map(t=>t.toUpperCase()).join('/')}</div>` : ''}
          <div class="result-badges">
            <span class="r-badge" style="color:${r.color};background:${r.color}22;border:1px solid ${r.color}55">
              ${r.label}
            </span>
            ${takesSuper ? `<span class="r-danger">⚠ takes ${p.defMult}× dmg</span>` : ''}
          </div>
          ${allMovesRated.length ? `<div class="r-moves" style="margin-top:5px">${moveDisplay}</div>` : ''}
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('battleResults').innerHTML = html;
}

    addToHistory(catchHistory, 'catchSuggs', candidate.name, 'quickCatch');
    renderCatchAnalysis(candidate);

function renderCatchAnalysis(candidate) {
  const currentScore  = teamCoverageScore(team);
  const currentWeaks  = teamWeaknesses(team);
  const currentUncov  = teamUncoveredTypes(team);

  // Simulate replacing each team slot with candidate
  const improvements = team.map((member, i) => {
    const newTeam = team.map((p, j) => j === i ? { ...candidate, moves: candidate.types.map(t => t) } : p);
    // Give candidate credit for STAB moves from its types
    const fakeMoves = candidate.types.flatMap(t => {
      const moveMap = { fire:["ember"], water:["water gun"], grass:["absorb"], electric:["thundershock"],
        psychic:["confusion"], fighting:["low kick"], rock:["rock throw"], ground:["mud slap"],
        flying:["gust"], ghost:["shadow ball"], ice:["ice beam"], dragon:["dragon claw"],
        dark:["bite"], steel:["metal claw"], bug:["fury cutter"], poison:["poison sting"],
        normal:["tackle"], fairy:["dazzling gleam"] };
      return moveMap[t] || [];
    });
    const fakeCandidate = { ...candidate, moves: fakeMoves };
    const testTeam = team.map((p, j) => j === i ? fakeCandidate : p);
    const newScore = teamCoverageScore(testTeam);
    const newWeaks = teamWeaknesses(testTeam);
    const scoreDelta = newScore - currentScore;
    const weakDelta  = currentWeaks.length - newWeaks.length;
    return { member, index: i, scoreDelta, weakDelta, newScore, newWeaks };
  }).sort((a, b) => (b.scoreDelta + b.weakDelta) - (a.scoreDelta + a.weakDelta));

  const best = improvements[0];
  const netGain = best.scoreDelta + best.weakDelta;

  // Determine verdict
  let verdict, verdictClass, reason;
  const newTypeCoverage = candidate.types.some(t => !team.some(p => p.types.includes(t)));
  const coversWeakness = candidate.types.some(t => !currentWeaks.includes(t) === false || currentUncov.includes(t));

  if (netGain >= 2 || best.scoreDelta >= 2) {
    verdict = "CATCH IT!"; verdictClass = "verdict-yes";
    reason = `${candidate.name.charAt(0).toUpperCase()+candidate.name.slice(1)} covers ${best.scoreDelta} new type(s) your team is missing. Solid upgrade for coverage.`;
  } else if (netGain >= 1 || currentUncov.some(t => candidate.types.some(at => getEff(at,[t])>=2))) {
    verdict = "WORTH IT"; verdictClass = "verdict-maybe";
    reason = `${candidate.name.charAt(0).toUpperCase()+candidate.name.slice(1)} provides some new coverage and could fill a gap. Consider it if you need that typing.`;
  } else if (newTypeCoverage) {
    verdict = "MAYBE"; verdictClass = "verdict-maybe";
    reason = `${candidate.name.charAt(0).toUpperCase()+candidate.name.slice(1)} brings a new type to the team but doesn't dramatically improve coverage right now.`;
  } else {
    verdict = "SKIP IT"; verdictClass = "verdict-no";
    reason = `Your team already covers what ${candidate.name.charAt(0).toUpperCase()+candidate.name.slice(1)} offers. No significant coverage improvement.`;
  }

  // Types candidate covers that team currently misses
  const newCoverage = currentUncov.filter(t => {
    const fakeMoves = candidate.types.flatMap(ct => {
      const mm = {fire:["ember"],water:["water gun"],grass:["absorb"],electric:["thundershock"],psychic:["confusion"],fighting:["low kick"],rock:["rock throw"],ground:["mud slap"],flying:["gust"],ghost:["shadow ball"],ice:["ice beam"],dragon:["dragon claw"],dark:["bite"],steel:["metal claw"],bug:["fury cutter"],poison:["poison sting"],normal:["tackle"],fairy:["dazzling gleam"]};
      return mm[ct] || [];
    });
    return getBestMult(fakeMoves, [t]) >= 2;
  });

  let html = `
    <div class="catch-result">
      <div class="catch-header">
        <img class="catch-sprite" src="${candidate.sprite}" alt="${candidate.name}"/>
        <div>
          <div class="catch-pname">${candidate.name}</div>
          <div class="type-badges" style="margin:4px 0">${candidate.types.map(typeBadge).join('')}</div>
          <span class="catch-verdict ${verdictClass}">${verdict}</span>
        </div>
      </div>
      <div class="catch-body">
        <div class="catch-reason">${reason}</div>
  `;

  if (newCoverage.length > 0) {
    html += `
      <div class="sec-label" style="margin-bottom:8px">NEW TYPE COVERAGE</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">
        ${newCoverage.map(t => `<span class="tbadge" style="background:${TC[t]||'#555'}">${t}</span>`).join('')}
      </div>
    `;
  }

  html += `<div class="sec-label" style="margin-bottom:8px">SWAP SUGGESTIONS</div>`;

  improvements.slice(0, 3).forEach((imp, i) => {
    const isRec = i === 0 && netGain > 0;
    const delta = imp.scoreDelta + imp.weakDelta;
    const deltaStr = delta > 0 ? `+${delta} coverage` : delta === 0 ? 'No change' : `${delta} coverage`;
    html += `
      <div class="swap-suggestion ${isRec?'recommended':''}">
        <img class="swap-sug-sprite" src="${spriteUrl(imp.member.id)}" alt="${imp.member.name}"/>
        <div class="swap-sug-info">
          <div class="swap-sug-name">Replace ${imp.member.name}</div>
          <div class="swap-sug-reason">${deltaStr} · ${imp.newScore}/18 types covered</div>
        </div>
        ${isRec ? `<div class="swap-sug-label">★ BEST<br>SWAP</div>` : ''}
      </div>
    `;
  });

  // Current team weaknesses
  if (currentWeaks.length) {
    html += `
      <div class="sec-label" style="margin-top:12px;margin-bottom:8px">TEAM WEAKNESSES</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${currentWeaks.map(t=>`<span class="tbadge" style="background:${TC[t]||'#555'}">${t}</span>`).join('')}
      </div>
    `;
  }

  html += '</div></div>';
  document.getElementById('catchResults').innerHTML = html;
}

// ─── TEAM EDITOR ─────────────────────────────────────────────
function renderTeamEditor() {
  document.getElementById('teamGrid').innerHTML = team.map((p,i) => buildMemberCard(p,i)).join('');
  // Always update dots after render in case cache loaded after initial dot colors were set
  requestAnimationFrame(() => updateAllMoveDots());
}

function buildMemberCard(p, i) {
  const es = editorState[i];

  const typeBadgesHtml = p.types.map(t =>
    `<span class="tbadge" style="background:${TC[t]||'#555'}">${t}</span>`
  ).join('');

  // Swap preview
  let swapPrevHtml = '';
  if (es.swapPreview) {
    const pv = es.swapPreview;
    swapPrevHtml = `
      <div class="swap-preview">
        <img src="${pv.sprite}" alt="${pv.name}" style="width:48px;height:48px;image-rendering:pixelated"/>
        <div>
          <div class="swap-preview-name">${pv.name}</div>
          <div class="swap-preview-types">${pv.types.map(t=>`<span class="tbadge" style="background:${TC[t]||'#555'}">${t}</span>`).join('')}</div>
        </div>
        <button class="swap-confirm" onclick="confirmSwap(${i})">SWAP!</button>
      </div>
    `;
  }

  // Evolution
  let evoHtml = '';
  if (es.evoLoading) {
    evoHtml = `<div class="poke-loading" style="text-align:left;padding:8px 0">LOADING...</div>`;
  } else if (es.evoChain && es.evoChain.length > 1) {
    const curPos = es.evoChain.findIndex(e => e.id === p.id);
    evoHtml = `<div class="evo-chain">` + es.evoChain.map((e, ei) => {
      const isCur  = e.id === p.id;
      const isNext = ei === curPos + 1;
      const cls = isCur ? 'current' : isNext ? 'available' : '';
      const arrow = ei > 0 ? `<div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        <span class="evo-arrow">▶</span>
        ${e.evoLabel ? `<span style="font-family:'Courier New',Courier,monospace;font-size:8px;color:${isNext?'#f0c040':'#4a6a54'};letter-spacing:0.5px;white-space:nowrap">${e.evoLabel}</span>` : ''}
      </div>` : '';
      return `${arrow}<div class="evo-step ${cls}" onclick="evolveSlot(${i},${ei})">
        <img src="${spriteUrl(e.id)}" alt="${e.name}"/>
        <div class="evo-step-name">${e.name}</div>
      </div>`;
    }).join('') + `</div>
    <div class="evo-hint">TAP GOLD STAGE TO EVOLVE</div>`;
  } else if (es.evoChain && es.evoChain.length === 1) {
    evoHtml = `<div class="evo-none">NO EVOLUTIONS</div>`;
  } else {
    evoHtml = `<button class="evo-load-btn" onclick="loadEvoChain(${i})">▶ LOAD EVOLUTION CHAIN</button>`;
  }

  // Moves
  const movesHtml = p.moves.map((m, mi) => {
    const mt = getMoveType(m);
    // Status moves: dim dot with border. Damage moves: solid colored dot. Unknown: dashed border
    let dotStyle;
    if (!mt) {
      dotStyle = 'background:transparent;border:1px dashed rgba(255,255,255,0.2)'; // unknown
    } else if (mt === '—') {
      dotStyle = 'background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2)'; // status
    } else {
      dotStyle = 'background:' + (TC[mt]||'#888'); // damage move - solid type color
    }
    return `
      <div class="move-row">
        <div class="move-dot" id="dot-${i}-${mi}" style="${dotStyle}"></div>
        <div class="move-wrap">
          <input class="move-input" value="${m}" placeholder="Move name"
            id="move-input-${i}-${mi}"
            oninput="onMoveInput(${i},${mi},this.value)"
            onblur="onMoveBlur(${i},${mi},this.value)"
            onkeydown="onMoveKeydown(event,${i},${mi})"
            autocorrect="off" autocapitalize="words" spellcheck="false"/>
          <div class="move-suggestions" id="move-sugg-${i}-${mi}" style="display:none"></div>
        </div>
        <button class="move-remove" onclick="removeMove(${i},${mi})">✕</button>
      </div>
    `;
  }).join('');

  return `
    <div class="member-card ${es.open?'open':''}" id="mc-${i}">
      <div class="member-header" onclick="toggleMember(${i})">
        <img class="member-sprite" src="${spriteUrl(p.id)}" alt="${p.name}"/>
        <div class="member-info">
          <div class="member-name">${p.nickname ? p.nickname.toUpperCase() : p.name}</div>
          ${p.nickname ? `<div class="member-species">${p.name}</div>` : ''}
          <div class="member-types">${typeBadgesHtml}</div>
        </div>
        <div class="member-chevron ${es.open?'open':''}">▼</div>
      </div>
      <div class="member-body ${es.open?'open':''}">

        <div class="ed-section">
          <div class="ed-label">NICKNAME</div>
          <input class="nickname-input" 
            value="${p.nickname || ''}"
            placeholder="Enter nickname (optional)"
            maxlength="12"
            oninput="updateNickname(${i}, this.value)"
            onblur="updateNickname(${i}, this.value)"
            autocorrect="off" autocapitalize="characters" spellcheck="false"/>
        </div>

        <div class="ed-section">
          <div class="ed-label">SWAP POKÉMON</div>
          <div class="swap-row">
            <input class="poke-input" placeholder="Search..." value="${es.swapInput}"
              id="swap-input-${i}"
              oninput="editorState[${i}].swapInput=this.value"
              onkeydown="if(event.key==='Enter')searchSwap(${i})"
              autocorrect="off" autocapitalize="off" spellcheck="false"/>
            <button class="poke-btn-gray" onclick="searchSwap(${i})">${es.swapLoading?'...':'FIND'}</button>
          </div>
          ${es.swapError ? `<div class="poke-error">${es.swapError}</div>` : ''}
          ${swapPrevHtml}
        </div>

        <div class="ed-section">
          <div class="ed-label">EVOLUTION CHAIN</div>
          ${evoHtml}
        </div>

        <div class="ed-section">
          <div class="ed-label">MOVES (${p.moves.length}/4)</div>
          <div class="moves-list">${movesHtml}</div>
          ${p.moves.length < 4 ? `<button class="add-move-btn" onclick="addMove(${i})">+ ADD MOVE</button>` : ''}
        </div>

      </div>
    </div>
  `;
}

function toggleMember(i) {
  editorState[i].open = !editorState[i].open;
  renderTeamEditor();
  if (editorState[i].open) {
    requestAnimationFrame(() => updateAllMoveDots());
  }
}

// Swap
async function searchSwap(i) {
  const es = editorState[i];
  const inp = document.getElementById(`swap-input-${i}`);
  const val = inp ? inp.value.trim() : es.swapInput.trim();
  if (!val) return;
  es.swapInput = val;
  es.swapLoading = true; es.swapError = ''; es.swapPreview = null;
  renderTeamEditor();
  try {
    es.swapPreview = await fetchPoke(val);
  } catch {
    es.swapError = `"${val}" NOT FOUND`;
  }
  es.swapLoading = false;
  renderTeamEditor();
}

function confirmSwap(i) {
  const pv = editorState[i].swapPreview;
  if (!pv) return;
  team[i] = {
    name: pv.name.charAt(0).toUpperCase() + pv.name.slice(1),
    id: pv.id, types: pv.types,
    moves: ["—"], color: TC[pv.types[0]] || "#888",
  };
  editorState[i] = { open:true, swapInput:"", swapPreview:null, swapError:"", swapLoading:false, evoChain:null, evoLoading:false };
  saveTeam();
  renderTeamEditor();
}

// Evolution
async function loadEvoChain(i) {
  editorState[i].evoLoading = true;
  renderTeamEditor();
  try {
    const specRes  = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${team[i].id}`);
    const specData = await specRes.json();
    const evoRes   = await fetch(specData.evolution_chain.url);
    const evoData  = await evoRes.json();
    const chain = [];
    async function walk(node, evoDetails) {
      const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${node.species.name}`);
      const d = await r.json();
      // Parse how this stage evolves from the previous
      let evoLabel = null;
      if (evoDetails && evoDetails.length > 0) {
        const det = evoDetails[0];
        if (det.min_level) {
          evoLabel = 'LV.' + det.min_level;
        } else if (det.item) {
          evoLabel = det.item.name.replace(/-/g,' ').toUpperCase();
        } else if (det.trigger && det.trigger.name === 'trade') {
          evoLabel = 'TRADE';
        } else if (det.min_happiness) {
          evoLabel = 'FRIENDSHIP';
        } else if (det.known_move) {
          evoLabel = 'MOVE';
        } else {
          evoLabel = det.trigger ? det.trigger.name.toUpperCase() : null;
        }
      }
      chain.push({ name: node.species.name, id: d.id, evoLabel });
      for (const nx of node.evolves_to) await walk(nx, nx.evolution_details);
    }
    await walk(evoData.chain, null);
    editorState[i].evoChain = chain;
  } catch { editorState[i].evoChain = []; }
  editorState[i].evoLoading = false;
  renderTeamEditor();
}

async function evolveSlot(slotIdx, evoIdx) {
  const chain  = editorState[slotIdx].evoChain;
  const curPos = chain.findIndex(e => e.id === team[slotIdx].id);
  if (evoIdx !== curPos + 1) return;
  const target = chain[evoIdx];
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${target.id}`);
    const d = await r.json();
    const newTypes = d.types.map(t=>t.type.name);
    team[slotIdx].name  = target.name.charAt(0).toUpperCase() + target.name.slice(1);
    team[slotIdx].id    = target.id;
    team[slotIdx].types = newTypes;
    team[slotIdx].color = TC[newTypes[0]] || '#888';
  } catch {}
  saveTeam();
  renderTeamEditor();
}

// Moves
function previewMoveDot(slotIdx, moveIdx, val) {
  const card = document.getElementById('mc-'+slotIdx);
  if (!card) return;
  const dots = card.querySelectorAll('.move-dot');
  if (!dots[moveIdx]) return;
  const mt = getMoveType(val);
  dots[moveIdx].style.background = mt && mt !== '—' ? (TC[mt]||'#555') : 'rgba(255,255,255,0.1)';
}
function finalizeMove(slotIdx, moveIdx, val) {
  const trimmed = val.trim();
  team[slotIdx].moves[moveIdx] = trimmed || '—';
  saveTeam();
  if (!trimmed || trimmed === '—') return;
  // Look up type from hardcoded dict - instant, no API needed
  const mt = getMoveType(trimmed);
  // Update dot color immediately
  const dot = document.getElementById('dot-' + slotIdx + '-' + moveIdx);
  if (dot) {
    if (!mt) {
      dot.style.background = 'transparent';
      dot.style.border = '1px dashed rgba(255,255,255,0.2)';
    } else if (mt === '—') {
      dot.style.background = 'rgba(255,255,255,0.12)';
      dot.style.border = '1px solid rgba(255,255,255,0.2)';
    } else {
      dot.style.background = TC[mt] || '#888';
      dot.style.border = '1px solid rgba(255,255,255,0.1)';
    }
  }
  // If not in hardcoded dict, fall back to API fetch
  if (!mt) {
    fetchMoveType(trimmed).then(apiType => {
      if (apiType) {
        const d = document.getElementById('dot-' + slotIdx + '-' + moveIdx);
        if (d) d.style.background = apiType !== '—' ? (TC[apiType]||'#555') : 'rgba(255,255,255,0.1)';
      }
    });
  }
}
function updateMove(slotIdx, moveIdx, val) {
  finalizeMove(slotIdx, moveIdx, val);
}
function removeMove(slotIdx, moveIdx) {
  team[slotIdx].moves.splice(moveIdx, 1);
  saveTeam();
  renderTeamEditor();
}

// ─── NICKNAME ────────────────────────────────────────────────
function updateNickname(slotIdx, val) {
  const trimmed = val.trim();
  team[slotIdx].nickname = trimmed || null;
  saveTeam();
  // Update header display without full re-render
  const card = document.getElementById('mc-' + slotIdx);
  if (card) {
    const nameEl = card.querySelector('.member-name');
    const specEl = card.querySelector('.member-species');
    if (nameEl) nameEl.textContent = trimmed ? trimmed.toUpperCase() : team[slotIdx].name;
    if (trimmed && !specEl) {
      const info = card.querySelector('.member-info');
      if (info) {
        const sp = document.createElement('div');
        sp.className = 'member-species';
        sp.textContent = team[slotIdx].name;
        info.insertBefore(sp, info.children[1]);
      }
    } else if (!trimmed && specEl) {
      specEl.remove();
    } else if (specEl) {
      specEl.textContent = team[slotIdx].name;
    }
  }
}

// ─── MOVE AUTOCOMPLETE ────────────────────────────────────────
let moveSearchTimer = null;
let activeSuggestion = { slot: -1, move: -1 };

async function onMoveInput(slotIdx, moveIdx, val) {
  previewMoveDot(slotIdx, moveIdx, val);
  clearTimeout(moveSearchTimer);
  const sugg = document.getElementById('move-sugg-' + slotIdx + '-' + moveIdx);
  if (!sugg) return;
  if (val.trim().length < 2) { sugg.style.display = 'none'; return; }
  moveSearchTimer = setTimeout(() => fetchMoveSuggestions(slotIdx, moveIdx, val), 300);
}

async function fetchMoveSuggestions(slotIdx, moveIdx, query) {
  const sugg = document.getElementById('move-sugg-' + slotIdx + '-' + moveIdx);
  if (!sugg) return;
  const q = query.trim().toLowerCase().replace(/ /g, '-');
  try {
    if (!allMovesCache) {
      const res = await fetch('https://pokeapi.co/api/v2/move?limit=1000');
      if (!res.ok) return;
      const data = await res.json();
      allMovesCache = data.results;
    }
    const matches = allMovesCache
      .filter(m => m.name.includes(q) || m.name.replace(/-/g,' ').includes(query.trim().toLowerCase()))
      .slice(0, 6);
    if (!matches || matches.length === 0) { sugg.style.display = 'none'; return; }
    sugg.innerHTML = matches.map(m => {
      const displayName = m.name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      const cached = moveTypeCache[m.name] || getMoveType(displayName);
      const dotColor = cached && cached !== '—' ? (TC[cached] || '#555') : 'rgba(255,255,255,0.15)';
      const typeLabel = cached && cached !== '—' ? cached.toUpperCase() : '';
      return `<div class="move-suggestion-item" 
        onmousedown="event.preventDefault()"
        onclick="selectMoveSuggestion(${slotIdx},${moveIdx},'${displayName}')">
        <div class="move-sug-dot" style="background:${dotColor}"></div>
        <span>${displayName}</span>
        <span class="move-sug-type">${typeLabel}</span>
      </div>`;
    }).join('');
    sugg.style.display = 'block';
    activeSuggestion = { slot: slotIdx, move: moveIdx };
  } catch(e) {
    sugg.style.display = 'none';
  }
}

function selectMoveSuggestion(slotIdx, moveIdx, moveName) {
  const input = document.getElementById('move-input-' + slotIdx + '-' + moveIdx);
  const sugg  = document.getElementById('move-sugg-' + slotIdx + '-' + moveIdx);
  if (input) input.value = moveName;
  if (sugg) sugg.style.display = 'none';
  finalizeMove(slotIdx, moveIdx, moveName);
}

function onMoveBlur(slotIdx, moveIdx, val) {
  // Small delay so click on suggestion registers first
  setTimeout(() => {
    const sugg = document.getElementById('move-sugg-' + slotIdx + '-' + moveIdx);
    if (sugg) sugg.style.display = 'none';
    finalizeMove(slotIdx, moveIdx, val);
  }, 150);
}

function onMoveKeydown(event, slotIdx, moveIdx) {
  if (event.key === 'Enter') { event.target.blur(); }
  if (event.key === 'Escape') {
    const sugg = document.getElementById('move-sugg-' + slotIdx + '-' + moveIdx);
    if (sugg) sugg.style.display = 'none';
  }
}

  updateAllMoveDots();
}

// Map state
let mapState = {
  scale: 1, tx: 0, ty: 0,
  layers: { city: true, route: true, dungeon: true },
  dragging: false, lastX: 0, lastY: 0,
  pinching: false, lastDist: 0,
  game: null
};

function initMap() {
  const game = currentGame ? currentGame.id : 'emerald';
  if (mapState.game === game && document.getElementById('map-svg').children.length > 0) {
    updateMapColors();
    return;
  }
  mapState.game = game;
  mapState.scale = 1; mapState.tx = 0; mapState.ty = 0;
  renderMapSVG();
  setupMapGestures();
  updateMapToggleColors();
}

function getMapData() {
  // For now all games use Hoenn - extend later
  return HOENN_MAP;
}

function renderMapSVG() {
  const map = getMapData();
  const game = currentGame || { accent:'#00a86b', border:'#1a4028', gold:'#f0c040' };
  const svg = document.getElementById('map-svg');
  const wrap = document.getElementById('map-wrap');

  // Set SVG size
  const W = 1000, H = 900;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  // Scale to fit screen initially
  const wrapW = wrap.clientWidth || 360;
  mapState.scale = wrapW / W;
  mapState.tx = 0;
  mapState.ty = 0;
  applyMapTransform();

  // Colors per type
  const colors = {
    city:    { fill:'#1a3a1a', stroke: game.accent,  label: game.accent  },
    route:   { fill:'#142814', stroke: game.border,   label:'#6a8a6a'    },
    dungeon: { fill:'#1a1a2a', stroke: game.gold,     label: game.gold   },
  };

  let svgContent = `
    <!-- Ocean background -->
    <rect width="${W}" height="${H}" fill="#0a1e2e"/>
    <!-- Land mass (simplified Hoenn shape) -->
    <rect x="40" y="170" width="320" height="720" rx="8" fill="#0d2010" opacity="0.6"/>
    <rect x="280" y="170" width="480" height="560" rx="8" fill="#0d2010" opacity="0.6"/>
    <rect x="680" y="170" width="280" height="480" rx="8" fill="#0d2010" opacity="0.6"/>
    <!-- Grid lines -->
    ${Array.from({length:20},(_,i)=>`<line x1="${i*50}" y1="0" x2="${i*50}" y2="${H}" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>`).join('')}
    ${Array.from({length:18},(_,i)=>`<line x1="0" y1="${i*50}" x2="${W}" y2="${i*50}" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>`).join('')}
  `;

  // Draw locations
  map.locations.forEach((loc, idx) => {
    const c = colors[loc.type];
    const layer = `layer-${loc.type}`;
    const display = mapState.layers[loc.type] ? '' : 'display:none';
    const rx = loc.type === 'city' ? 6 : loc.type === 'dungeon' ? 3 : 2;
    const fontSize = loc.type === 'city' ? 10 : 8;
    const nameShort = loc.name.replace('Route ','R.').replace(' Town','').replace(' City','').replace(' Cave','').replace(' Falls','');

    const fw = loc.type === 'city' ? 'bold' : 'normal';
    const sw = loc.type === 'city' ? 2 : 1;
    svgContent += `
    <g class="map-loc" data-layer="${layer}" data-name="${loc.name}" data-type="${loc.type}" style="${display}">
      <rect x="${loc.x}" y="${loc.y}" width="${loc.w}" height="${loc.h}"
            fill="${c.fill}" stroke="${c.stroke}" stroke-width="${sw}"
            rx="${rx}" opacity="0.9"/>
      <text x="${loc.x + loc.w/2}" y="${loc.y + loc.h/2 + fontSize*0.35}"
            text-anchor="middle" fill="${c.label}"
            font-family="Courier New" font-size="${fontSize}"
            font-weight="${fw}">${nameShort}</text>
      <rect x="${loc.x}" y="${loc.y}" width="${loc.w}" height="${loc.h}"
            fill="transparent" rx="${rx}" style="cursor:pointer"
            onclick="mapLocTap(this)"/>
    </g>`;
  });

  svg.innerHTML = svgContent;
}

function mapLocTap(el) {
  const g = el.closest ? el.closest('[data-name]') : el.parentElement;
  const name = g ? g.getAttribute('data-name') : '';
  const type = g ? g.getAttribute('data-type') : '';
  const panel = document.getElementById('map-info');
  const nameEl = document.getElementById('map-info-name');
  const typeEl = document.getElementById('map-info-type');
  const encEl  = document.getElementById('map-info-encounters');

  nameEl.textContent = name;
  const typeLabels = { city:'TOWN / CITY', route:'ROUTE', dungeon:'DUNGEON / AREA' };
  typeEl.textContent = typeLabels[type] || type.toUpperCase();
  typeEl.style.color = type === 'city' ? currentGame?.accent || '#00a86b'
                     : type === 'dungeon' ? currentGame?.gold || '#f0c040'
                     : '#6a8a6a';

  const encs = ENCOUNTERS[name];
  if (encs && encs.length) {
    encEl.innerHTML = '<div style="font-family:'Courier New',monospace;font-size:9px;color:#4a6a54;letter-spacing:2px;margin-bottom:8px">WILD POKÉMON</div>' +
      encs.map(e => {
        const dotColor = TC[e.type] || '#555';
        return `<div class="encounter-row">
          <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
          <span>${e.name}</span>
          <span class="encounter-rarity rarity-${e.rarity}">${e.rarity.toUpperCase()}</span>
        </div>`;
      }).join('');
  } else {
    encEl.innerHTML = '<div class="map-no-data">No encounter data yet</div>';
  }

  panel.classList.add('open');
}

function closeMapInfo() {
  document.getElementById('map-info').classList.remove('open');
}

function toggleLayer(type) {
  mapState.layers[type] = !mapState.layers[type];
  const btn = document.getElementById('tog-' + type);
  btn.className = 'map-toggle ' + (mapState.layers[type] ? 'on' : 'off');
  updateMapToggleColors();
  // Show/hide elements
  document.querySelectorAll(`[data-layer="layer-${type}"]`).forEach(el => {
    el.style.display = mapState.layers[type] ? '' : 'none';
  });
}

function updateMapToggleColors() {
  const game = currentGame || { accent:'#00a86b', gold:'#f0c040', border:'#1a4028' };
  const toggles = {
    'tog-city':    { color: game.accent, border: game.accent },
    'tog-route':   { color: '#6a8a6a',  border: '#1a4028' },
    'tog-dungeon': { color: game.gold,  border: game.gold },
  };
  Object.entries(toggles).forEach(([id, style]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.classList.contains('on')) {
      el.style.background = style.color + '33';
      el.style.borderColor = style.color;
      el.style.color = style.color;
    } else {
      el.style.background = 'transparent';
      el.style.borderColor = style.border;
      el.style.color = style.color;
    }
  });
}

function updateMapColors() {
  updateMapToggleColors();
}

function applyMapTransform() {
  const svg = document.getElementById('map-svg');
  if (svg) svg.style.transform = `translate(${mapState.tx}px,${mapState.ty}px) scale(${mapState.scale})`;
}

function setupMapGestures() {
  const wrap = document.getElementById('map-wrap');
  if (!wrap || wrap._mapListenersAdded) return;
  wrap._mapListenersAdded = true;

  let startX, startY, startTx, startTy;
  let pinchStartDist, pinchStartScale;

  function dist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function clampTranslate() {
    const W = 1000, H = 900;
    const sw = wrap.clientWidth, sh = wrap.clientHeight;
    const maxTx = 0, minTx = sw - W * mapState.scale;
    const maxTy = 0, minTy = sh - H * mapState.scale;
    mapState.tx = clamp(mapState.tx, Math.min(minTx,0), Math.max(maxTx,0));
    mapState.ty = clamp(mapState.ty, Math.min(minTy,0), Math.max(maxTy,0));
  }

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchStartDist = dist(e.touches);
      pinchStartScale = mapState.scale;
      mapState.pinching = true;
    } else if (e.touches.length === 1) {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTx = mapState.tx; startTy = mapState.ty;
      mapState.dragging = true; mapState.pinching = false;
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (mapState.pinching && e.touches.length === 2) {
      const newDist = dist(e.touches);
      const newScale = clamp(pinchStartScale * (newDist / pinchStartDist), 0.5, 4);
      // Zoom toward center of pinch
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - wrap.getBoundingClientRect().left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - wrap.getBoundingClientRect().top;
      const ratio = newScale / mapState.scale;
      mapState.tx = cx - ratio * (cx - mapState.tx);
      mapState.ty = cy - ratio * (cy - mapState.ty);
      mapState.scale = newScale;
      clampTranslate();
      applyMapTransform();
    } else if (mapState.dragging && e.touches.length === 1) {
      mapState.tx = startTx + (e.touches[0].clientX - startX);
      mapState.ty = startTy + (e.touches[0].clientY - startY);
      clampTranslate();
      applyMapTransform();
    }
  }, { passive: false });

  wrap.addEventListener('touchend', e => {
    if (e.touches.length < 2) mapState.pinching = false;
    if (e.touches.length === 0) mapState.dragging = false;
  }, { passive: true });

  // Double tap to zoom
  let lastTap = 0;
  wrap.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    const now = Date.now();
    if (now - lastTap < 300) {
      const t = e.changedTouches[0];
      const rect = wrap.getBoundingClientRect();
      const cx = t.clientX - rect.left;
      const cy = t.clientY - rect.top;
      if (mapState.scale < 1.8) {
        const newScale = 2.5;
        mapState.tx = cx - (newScale/mapState.scale) * (cx - mapState.tx);
        mapState.ty = cy - (newScale/mapState.scale) * (cy - mapState.ty);
        mapState.scale = newScale;
      } else {
        const wrapW = wrap.clientWidth;
        mapState.scale = wrapW / 1000;
        mapState.tx = 0; mapState.ty = 0;
      }
      clampTranslate();
      applyMapTransform();
    }
    lastTap = now;
  }, { passive: true });
}

function saveTeam() {
  try {
    const key = 'team_' + (currentGame ? currentGame.id : 'emerald');
    localStorage.setItem(key, JSON.stringify(team));
  } catch(e) {}
}
// Team loaded at init above
function addMove(slotIdx) {
  if (team[slotIdx].moves.length < 4) {
    team[slotIdx].moves.push('');
    saveTeam();
    renderTeamEditor();
    setTimeout(() => {
      const card = document.getElementById(`mc-${slotIdx}`);
      if (card) { const ins = card.querySelectorAll('.move-input'); if(ins.length) ins[ins.length-1].focus(); }
    }, 50);
  }
}
